    <!-- Preconnect to Supabase -->
    <link rel="preconnect" href="https://lazryrfxndirnqmwcapt.supabase.co" />

    <!-- Fonts with display=swap so text renders immediately in fallback font -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,900&family=Inter:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,900&family=Inter:wght@400;500;600;700;800&display=swap" />
