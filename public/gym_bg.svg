<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="gymBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#080808"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#gymBg)"/>
  <!-- Fake gym equipment silhouettes - barbells -->
  <rect x="0" y="160" width="600" height="18" rx="9" fill="#1a1a1a"/>
  <!-- Left weight plate -->
  <rect x="20" y="130" width="28" height="78" rx="6" fill="#222"/>
  <rect x="52" y="140" width="18" height="58" rx="4" fill="#1c1c1c"/>
  <!-- Right weight plate -->
  <rect x="552" y="130" width="28" height="78" rx="6" fill="#222"/>
  <rect x="530" y="140" width="18" height="58" rx="4" fill="#1c1c1c"/>
  <!-- Vertical lines / columns suggesting gym interior -->
  <rect x="100" y="0" width="2" height="400" fill="#1e1e1e"/>
  <rect x="250" y="0" width="2" height="400" fill="#1e1e1e"/>
  <rect x="350" y="0" width="2" height="400" fill="#1e1e1e"/>
  <rect x="500" y="0" width="2" height="400" fill="#1e1e1e"/>
  <!-- Red accent glow at center bottom -->
  <ellipse cx="300" cy="400" rx="200" ry="60" fill="#E31B23" opacity="0.08" filter="url(#blur)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="100" x2="600" y2="100" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="200" x2="600" y2="200" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="300" x2="600" y2="300" stroke="#1a1a1a" stroke-width="1"/>
</svg>
