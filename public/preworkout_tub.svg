<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="tubGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E31B23"/>
      <stop offset="100%" style="stop-color:#8b0e14"/>
    </linearGradient>
    <linearGradient id="lidGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#1c1c1c"/>
    </linearGradient>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f8f8"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bgGrad3)"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="340" rx="105" ry="14" fill="#000" opacity="0.15"/>
  <!-- Tub body -->
  <rect x="92" y="140" width="216" height="190" rx="20" fill="url(#tubGrad3)"/>
  <!-- Dark label overlay -->
  <rect x="97" y="165" width="206" height="130" rx="4" fill="rgba(0,0,0,0.2)"/>
  <!-- Lightning bolt accent -->
  <polygon points="210,175 195,220 205,220 190,255 215,210 203,210 218,175" fill="white" opacity="0.12"/>
  <!-- Product text -->
  <text x="200" y="208" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle" letter-spacing="3">PRE-WORKOUT</text>
  <text x="200" y="234" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">IGNITE</text>
  <text x="200" y="258" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="3">EXPLOSIVE ENERGY</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="2">200MG CAFFEINE · 300G</text>
  <!-- Lid -->
  <rect x="87" y="118" width="226" height="40" rx="14" fill="url(#lidGrad3)"/>
  <text x="200" y="143" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="white" text-anchor="middle" letter-spacing="3">FLEX SUPPS</text>
  <!-- Shine highlight -->
  <rect x="97" y="145" width="7" height="175" rx="3" fill="white" opacity="0.1"/>
  <!-- Bottom rim -->
  <rect x="92" y="316" width="216" height="14" rx="8" fill="#5c0007"/>
</svg>
